# SW Requirement Schema
#
# Defines the `body` structure for artifacts of type: sw-requirement
#
# A SW requirement defines what the software must do. It can exist at
# any level — high-level (input to architecture) or low-level (derived
# during design). The level is a graph property determined by Pillar 2
# traceability links, not by having separate schemas.
#
# Requirements can span multiple architecture components. Allocation
# to components is managed by Pillar 2 (allocated-to links), not by
# fields in this schema.
#
# This schema is part of Pillar 1 (V-Model Compliance).
# It has no dependency on Pillar 2 (Traceability) or Pillar 3 (Agentic Skills).

schema_version: "1.0"
schema_id: sw-requirement

fields:

  # --- Required Fields (structural, traced by Pillar 2) ---

  title:
    type: string
    required: true
    description: "Short descriptive name for this requirement"

  statement:
    type: string
    required: true
    description: >
      The requirement text. Free-form — any syntax is valid at the
      schema level. EARS syntax may be used by craft skills but is
      not enforced here.

  verification_method:
    type: enum
    required: true
    description: >
      How this requirement will be verified. Every requirement must
      declare its verification method. This is universal across
      DO-178C, ASPICE, IEC 62304, and other V-model standards.
    values:
      - test              # Verified by executing test cases
      - analysis          # Verified by analytical methods (calculation, simulation)
      - inspection        # Verified by visual examination of the artifact
      - demonstration     # Verified by operating the system under specific conditions
      - review            # Verified by formal review process

  # --- Optional Fields (pragmatic, not traced, can evolve) ---

  rationale:
    type: string
    required: false
    description: >
      Why this requirement exists. Captures the motivation or
      justification. Especially valuable for derived requirements
      where the origin may not be obvious.

  source:
    type: string
    required: false
    description: >
      Provenance metadata — where this requirement originated.
      This is informational context, NOT a formal trace link.
      Formal traceability (derived-from, allocated-to) is managed
      by Pillar 2 trace files.
    examples:
      - "Derived from SYSREQ-007 during architecture analysis"
      - "Stakeholder interview, 2024-03-15"
      - "Safety analysis finding SA-012"

  attributes:
    type: object
    required: false
    description: >
      Classification flags for this requirement. All are boolean
      and optional. Used for filtering and reporting, not for
      traceability.
    fields:
      safety_relevant:
        type: boolean
        required: false
        description: "True if this requirement is safety-critical"
      performance:
        type: boolean
        required: false
        description: "True if this requirement specifies timing or throughput constraints"
      interface:
        type: boolean
        required: false
        description: "True if this requirement defines an interface contract"
      derived:
        type: boolean
        required: false
        description: >
          True if this requirement was derived during design or
          architecture, not directly traceable to a higher-level
          requirement. Derived requirements need special attention
          in safety assessments.

  notes:
    type: string
    required: false
    description: >
      Free-form additional context. References to external documents,
      historical context, known limitations, etc.

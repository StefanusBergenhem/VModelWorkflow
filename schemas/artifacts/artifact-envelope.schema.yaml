# Artifact Envelope Schema
#
# Common structure shared by ALL V-model artifacts.
# Type-specific content goes in the `body` field, defined by
# the artifact type schema referenced in `artifact_type`.
#
# This schema is part of Pillar 1 (V-Model Compliance).
# It has no dependency on Pillar 2 (Traceability) or Pillar 3 (Agentic Skills).

schema_version: "1.0"
schema_id: artifact-envelope

# --- Required Fields ---

artifact_id:
  type: string
  required: true
  description: >
    Human-readable identifier. Format: TYPE-nnn where TYPE is an uppercase
    abbreviation of the artifact type and nnn is a zero-padded sequential
    number within that type.
  pattern: "^[A-Z]+-\\d{3,}$"
  examples:
    - "SYSREQ-001"     # System Requirement
    - "SYSTEST-001"    # System Test Case
    - "SWREQ-042"      # SW Requirement
    - "ARCH-003"       # SW Architecture
    - "DD-017"         # Detailed Design
    - "TS-042-01"      # Test Specification
    - "TR-042-01"      # Test Result
    - "CR-007"         # Coverage Report
    - "RR-042-001"     # Review Record
    - "DEVPLAN-001"    # Development Plan
    - "VPLAN-001"      # Verification Plan
    - "CMPLAN-001"     # Configuration Management Plan
    - "QAPLAN-001"     # Quality Assurance Plan
    - "SCM-001"        # Source Code Metadata

artifact_type:
  type: string
  required: true
  description: >
    References an artifact type schema in schemas/artifacts/.
    Defines the structure of the body field.
  values:
    - system-requirement
    - system-test-case
    - sw-requirement
    - sw-architecture
    - detailed-design
    - source-code-metadata
    - test-specification
    - test-result
    - coverage-report
    - review-record
    - development-plan
    - verification-plan
    - cm-plan
    - qa-plan

version:
  type: string
  required: true
  description: >
    Semantic version of this artifact. Incremented when content changes.
    Major: breaking change to interfaces/contracts.
    Minor: content additions or refinements.
    Patch: corrections that don't change meaning.
  pattern: "^\\d+\\.\\d+\\.\\d+$"
  example: "1.0.0"

status:
  type: enum
  required: true
  description: "Lifecycle state of this artifact"
  values:
    - draft          # Initial creation, work in progress
    - in_review      # Submitted for review, not yet approved
    - approved       # Reviewed and accepted
    - baselined      # Frozen in a configuration baseline
    - superseded     # Replaced by a newer version
  lifecycle: |
    draft ──> in_review ──> approved ──> baselined
      ^           |                         |
      └───────────┘                         v
      (rejected)                        superseded

body:
  type: object
  required: true
  description: >
    Type-specific content. Structure defined by the artifact type schema
    referenced in artifact_type. The envelope does not interpret body
    content — it is opaque at this level.

# --- Auto-Generated Fields ---

content_hash:
  type: string
  required: false
  description: >
    Hash of the body content, used for change detection and staleness
    checking. Computed from the serialized body field only (not from
    envelope fields like status or version).
    Format: first 8 characters of SHA-256 hex digest.
    Auto-generated by tooling. Not hand-written.
    Used in machine-facing ID form: SWREQ-042@a3f7c2d1
  pattern: "^[a-f0-9]{8}$"

# --- Fields Explicitly Excluded ---
#
# created_by:     Not included. Authorship (human or agent) is irrelevant
#                 to compliance assessment.
#
# reviewed_by:    Not included. A name on a field is insufficient evidence.
#                 Review evidence is captured in Review Record artifacts
#                 (artifact_type: review-record) linked via Pillar 2
#                 traceability.
#
# trace_up/down:  Not included. Traceability between artifacts is managed
#                 by Pillar 2 (Traceability) in separate trace files.
#                 Artifacts are linked by artifact_id, not by embedded
#                 references.

# --- File Convention ---
#
# Most artifacts are stored as one YAML file:
#   {artifact_id}.yaml
#
# Exception: detailed-design artifacts use Markdown with YAML frontmatter:
#   {artifact_id}.md
#   Component designs: CD-001.md, CD-002.md
#   Unit designs (standalone): DD-017.md, DD-018.md
#
# Example: SWREQ-042.yaml
#
# Artifacts live in the target project repository alongside code,
# organized by type:
#   docs/artifacts/system-requirements/SYSREQ-001.yaml
#   docs/artifacts/system-test-cases/SYSTEST-001.yaml
#   docs/artifacts/sw-requirements/SWREQ-042.yaml
#   docs/artifacts/detailed-design/CD-001.md
#   docs/artifacts/detailed-design/DD-017.md
#   docs/artifacts/test-specifications/TS-042-01.yaml
#   docs/artifacts/review-records/RR-042-001.yaml

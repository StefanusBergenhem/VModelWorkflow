# VModel Project Configuration Schema
# =============================================================================
#
# Defines a VModelWorkflow project's central config. Lives at
# .vmodel/config.yaml in each consuming project. All vmodel-* skills load
# this to resolve reference paths, commands, and project metadata.
#
# Resolution rule for skill references:
#   - Skills NEVER hardcode framework `docs/*.md` paths.
#   - Skills resolve reference docs via `paths.references` (default
#     `.vmodel/references/`) and load named files (authoring-discipline.md,
#     partial-parent-protocol.md, authoring-self-check.md, etc.).
#   - Framework ships defaults; init copies them; project may override.
#
# =============================================================================

schema_version: "1.0"
schema_id: vmodel-config

# =============================================================================
# PROJECT
# =============================================================================

project:
  name:
    type: string
    required: true
    description: "Project identifier. Used in artifact IDs and trace references."
    example: "vmodel-core"

  description:
    type: string
    required: false
    description: "One-line project description."
    example: "V-model framework reference implementation"

  language:
    type: string
    required: true
    description: "Primary programming language. Auto-detected at init."
    example: "go"
    allowed: ["go", "python", "java", "rust", "typescript", "kotlin", "csharp", "other"]

  scope_root:
    type: string
    required: true
    description: "Root of the spec scope tree. Relative to project root."
    default: "specs/"

# =============================================================================
# PATHS
# =============================================================================
#
# Resolves to where skills find their inputs and write their outputs.
# All paths are relative to the project root unless absolute.

paths:
  references:
    type: string
    required: true
    description: >
      Directory of shared reference docs (authoring-discipline, partial-parent-protocol,
      authoring-self-check, requirements-shape-checklist, definitions/). Skills load
      these by filename: <paths.references>/<name>.md.
    default: ".vmodel/references/"

  reviews:
    type: string
    required: true
    description: "Directory for spec-side review verdict files (.yaml)."
    default: ".vmodel/.reviews/"

  build:
    type: string
    required: true
    description: "Directory for build-flow state, tasks, escalations, runs."
    default: ".vmodel/.build/"

  defer_index:
    type: string
    required: true
    description: "Path to the auto-generated DEFER aggregate file."
    default: ".vmodel/defer-index.md"

  src:
    type: string
    required: false
    description: "Source code root (build flow). Optional if build flow is unused."
    example: "src/"

  tests:
    type: string
    required: false
    description: "Test code root (build flow). Optional if build flow is unused."
    example: "tests/"

# =============================================================================
# ARTIFACTS
# =============================================================================
#
# Shape declarations for the spec tree.

artifacts:
  root_product:
    type:
      type: string
      required: true
      description: >
        Which root-of-tree product artifact this project uses. One of:
        pb (product brief, heavyweight), needs (interview-derived, mid-weight),
        pd (product description, lightweight).
      allowed: ["pb", "needs", "pd"]
      default: "pd"

    file:
      type: string
      required: true
      description: "Filename of the chosen root product."
      allowed: ["product_brief.md", "needs.md", "product_description.md"]

# =============================================================================
# COMMANDS
# =============================================================================
#
# Project-specific shell commands. Build flow reads these.
# Empty string ("") means "not configured for this project."

commands:
  test_unit:
    type: string
    required: false
    description: "Run unit tests. Must exit 0 on pass, non-zero on fail."
    example: "go test ./..."

  test_integration:
    type: string
    required: false
    description: "Run integration tests (branch-level). Optional."
    example: "go test -tags=integration ./..."

  test_system:
    type: string
    required: false
    description: "Run system / acceptance tests (root-level). Optional."
    example: "go test -tags=e2e ./..."

  lint:
    type: string
    required: false
    description: "Linter / static analysis."
    example: "golangci-lint run"

  build:
    type: string
    required: false
    description: "Build / compile."
    example: "go build ./..."

  coverage:
    type: string
    required: false
    description: "Coverage report. Must exit 0 if threshold met."
    example: "go test ./... -coverprofile=coverage.out"

# =============================================================================
# BUILD FLOW
# =============================================================================
#
# Pipeline behaviour for the build-side skills (plan-build, orchestrate-build,
# implement-leaf, review-execution, etc.).

build:
  parallel:
    enabled:
      type: boolean
      required: false
      default: true
      description: "Run independent leaf tasks in parallel within a stage."

    max_concurrent:
      type: integer
      required: false
      default: 4
      description: "Max parallel leaf-implementation tasks per stage."

  retry:
    max_review_attempts:
      type: integer
      required: false
      default: 3
      description: >
        Max review-implementation rejection cycles before escalating to a
        spec-layer skill. Once exceeded, an ESC-NNN.yaml is created.

  auto_amend:
    max_auto_amendments:
      type: integer
      required: false
      default: 1
      description: >
        Max times orchestrator may auto-expand a task's files_to_touch /
        context_to_load in response to a build-blocked.yaml with
        suggested_resolution: amend-contract. Beyond this, the blocker
        escalates as a DESIGN_ISSUE to detailed-design.

  models:
    plan:
      type: string
      required: false
      default: "opus"
      description: "Model tier for plan-build (DAG derivation)."

    implement:
      type: string
      required: false
      default: "sonnet"
      description: "Model tier for implement-leaf."

    review:
      type: string
      required: false
      default: "sonnet"
      description: "Model tier for review-execution."

    retrospect:
      type: string
      required: false
      default: "sonnet"
      description: "Model tier for retrospect-build."

# =============================================================================
# COMPONENT OVERRIDES
# =============================================================================
#
# Path-prefix-based overrides for multi-language / multi-module projects.
# Most specific path match wins. Override fully replaces the matching default
# section for that path (no merging).

components:
  type: map<path_prefix, component_override>
  required: false
  description: >
    Optional per-path overrides for language, commands, etc. Keyed by
    directory prefix (with trailing /).

component_override:
  language:
    type: string
    required: false

  commands:
    type: object
    required: false
    description: "Same shape as top-level commands; replaces commands for this prefix."

# =============================================================================
# EXAMPLE
# =============================================================================
#
# project:
#   name: "vmodel-core"
#   description: "V-model framework reference implementation"
#   language: "go"
#   scope_root: "specs/"
#
# paths:
#   references: ".vmodel/references/"
#   reviews: ".vmodel/.reviews/"
#   build: ".vmodel/.build/"
#   defer_index: ".vmodel/defer-index.md"
#   src: "src/"
#   tests: "tests/"
#
# artifacts:
#   root_product:
#     type: "pd"
#     file: "product_description.md"
#
# commands:
#   test_unit: "go test ./..."
#   test_integration: ""
#   test_system: ""
#   lint: "golangci-lint run"
#   build: "go build ./..."
#   coverage: "go test ./... -cover"
#
# build:
#   parallel:
#     enabled: true
#     max_concurrent: 4
#   retry:
#     max_review_attempts: 3
#   auto_amend:
#     max_auto_amendments: 1
#   models:
#     plan: "opus"
#     implement: "sonnet"
#     review: "sonnet"
#     retrospect: "sonnet"
